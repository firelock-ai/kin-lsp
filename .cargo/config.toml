# Kin Cargo registry for public and local builds.
#
# Keep this file free of local path patches and credentials so a fresh public
# clone can resolve Kin crates from public source. Put machine-local overrides
# in Cargo's user-level config instead of this tracked file.

[registries.kin]
index = "sparse+https://kinlab.ai/registry/cargo/"

# Dev-only sibling-checkout pins for kin-model's transitive deps. The
# registry_smoke CI job strips this whole [patch.kin] block and rebuilds from
# the published registry, so these never affect the registry-resolution proof.
# kin-model itself is NOT pinned here: kin-lsp depends on kin-model ^0.2.0, which
# the registry serves directly — a git-pinned older rev would be unused and the
# cargo resolver would warn on every build.
[patch.kin]
kin-blobs = { git = "https://github.com/firelock-ai/kin-blobs.git", rev = "5e8b3c3a596163fe6c4b276bcd27c02ffacd694f" }
kin-vector = { git = "https://github.com/firelock-ai/kin-vector.git", rev = "dd743d741c6832e15179ac60720b5218558e10fb" }
